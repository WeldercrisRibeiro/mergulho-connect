services:
  - type: web
    name: mergulho-connect-api
    runtime: node
    plan: free # Define explicitamente que queremos o plano gratuito
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Porta padrão do Render
      - key: DATABASE_URL
        sync: false # O usuário deve preencher manualmente no painel
      - key: DIRECT_URL
        sync: false # O usuário deve preencher manualmente no painel
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30m
      - key: FRONTEND_URL
        sync: false # URL da Vercel (ex: https://mergulho-connect.vercel.app)
      - key: UPLOADS_DIR
        value: ./uploads
