services:
  - type: web
    name: mergulho-backend
    runtime: docker
    # Aponta para o Dockerfile na pasta backend/
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    # Porta que o Express usa
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Sao_Paulo
      # As variáveis abaixo devem ser configuradas no painel do Render (não commitadas)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    # Health check para manter o serviço ativo
    healthCheckPath: /api/health
