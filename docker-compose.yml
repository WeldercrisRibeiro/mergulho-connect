version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ccm_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ccm_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mergulho123
    ports:
      - "5433:5434"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mergulho"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
